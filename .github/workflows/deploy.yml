name: Build, verify & deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages + verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize per ref so PR validation runs don't cancel a production deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Runs on PRs AND main: builds, runs the SEO/URL gate + functional tests, uploads the artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify SEO + URL inventory (gates deploy)
        run: npm run verify:build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Functional smoke tests (per tool)
        run: npm run test:e2e
      - name: Lighthouse (Web Vitals budgets)
        # Report-but-don't-block on the first deploys (perf budgets need a real CI baseline).
        # Flip to blocking by removing continue-on-error once you've seen a green run.
        continue-on-error: true
        run: npm run test:lh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploys ONLY from main (push or manual dispatch) — never from a pull request.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
