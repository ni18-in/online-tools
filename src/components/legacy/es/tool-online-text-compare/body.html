<div class="container">
        <header>
            <h1 data-lang="pageTitle">Comparador de Texto Online</h1>
            <div class="header-controls">
                <button id="compareButton" class="compare-main-btn" aria-label="Comparar textos" title="Comparar textos">
                    <i class="material-icons">compare_arrows</i> <span data-lang="compareButton">Comparar</span>
                </button>
                <select id="languageSelector" aria-label="Seleccionar idioma">
                    </select>
                <button id="swapButton" aria-label="Intercambiar textos" title="Intercambiar textos">
                    <i class="material-icons">swap_horiz</i> <span data-lang="swapButton">Intercambiar</span>
                </button>
                <button id="copyResultButton" aria-label="Copiar resultado" title="Copiar resultado">
                    <i class="material-icons">content_copy</i> <span data-lang="copyResultButton">Copiar Resultado</span>
                </button>
                <button id="downloadButton" aria-label="Descargar diferencia" title="Descargar diferencia">
                    <i class="material-icons">download</i> <span data-lang="downloadButton">Descargar</span>
                </button>
                <button id="printButton" aria-label="Imprimir diferencia" title="Imprimir diferencia">
                    <i class="material-icons">print</i> <span data-lang="printButton">Imprimir</span>
                </button>
                <button id="darkModeToggle" aria-label="Alternar modo oscuro" title="Alternar modo oscuro">
                    <i class="material-icons">brightness_6</i>
                </button>
            </div>
        </header>

        <main class="comparison-area">
            <div class="text-panel" id="panel1">
                <label for="text1" data-lang="text1Label">Texto 1</label>
                <textarea id="text1" aria-label="Entrada de texto 1" placeholder="Pega o escribe el texto aquí..."></textarea>
                <div class="panel-controls">
                    <button class="copy-button" data-text-target="text1" aria-label="Copiar texto 1" title="Copiar texto 1">
                        <i class="material-icons">content_copy</i> <span data-lang="copyButton">Copiar</span>
                    </button>
                    <button class="paste-button" data-text-target="text1" aria-label="Pegar en texto 1" title="Pegar en texto 1">
                        <i class="material-icons">content_paste</i> <span data-lang="pasteButton">Pegar</span>
                    </button>
                    <button class="clear-button" data-text-target="text1" aria-label="Limpiar texto 1" title="Limpiar texto 1">
                        <i class="material-icons">clear</i> <span data-lang="clearButton">Limpiar</span>
                    </button>
                </div>
                <div id="diffOutput1" class="diff-output" aria-live="polite" aria-atomic="true" data-lang-placeholder="diffOutputPlaceholder">Las diferencias aparecerán aquí después de la comparación.</div>
            </div>

            <div class="text-panel" id="panel2">
                <label for="text2" data-lang="text2Label">Texto 2</label>
                <textarea id="text2" aria-label="Entrada de texto 2" placeholder="Pega o escribe el texto aquí..."></textarea>
                <div class="panel-controls">
                    <button class="copy-button" data-text-target="text2" aria-label="Copiar texto 2" title="Copiar texto 2">
                        <i class="material-icons">content_copy</i> <span data-lang="copyButton">Copiar</span>
                    </button>
                    <button class="paste-button" data-text-target="text2" aria-label="Pegar en texto 2" title="Pegar en texto 2">
                        <i class="material-icons">content_paste</i> <span data-lang="pasteButton">Pegar</span>
                    </button>
                    <button class="clear-button" data-text-target="text2" aria-label="Limpiar texto 2" title="Limpiar texto 2">
                        <i class="material-icons">clear</i> <span data-lang="clearButton">Limpiar</span>
                    </button>
                </div>
                <div id="diffOutput2" class="diff-output" aria-live="polite" aria-atomic="true" data-lang-placeholder="diffOutputPlaceholder">Las diferencias aparecerán aquí después de la comparación.</div>
            </div>
        </main>
    </div>
