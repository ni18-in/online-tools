<div class="container">
        <header>
            <h1 data-lang="pageTitle">Comparateur de Texte en Ligne</h1>
            <div class="header-controls">
                <button id="compareButton" class="compare-main-btn" aria-label="Comparer les textes" title="Comparer les textes">
                    <i class="material-icons">compare_arrows</i> <span data-lang="compareButton">Comparer</span>
                </button>
                <select id="languageSelector" aria-label="Sélectionner la langue">
                    </select>
                <button id="swapButton" aria-label="Échanger les textes" title="Échanger les textes">
                    <i class="material-icons">swap_horiz</i> <span data-lang="swapButton">Échanger</span>
                </button>
                <button id="copyResultButton" aria-label="Copier le résultat" title="Copier le résultat">
                    <i class="material-icons">content_copy</i> <span data-lang="copyResultButton">Copier le Résultat</span>
                </button>
                <button id="downloadButton" aria-label="Télécharger le diff" title="Télécharger le diff">
                    <i class="material-icons">download</i> <span data-lang="downloadButton">Télécharger</span>
                </button>
                <button id="printButton" aria-label="Imprimer le diff" title="Imprimer le diff">
                    <i class="material-icons">print</i> <span data-lang="printButton">Imprimer</span>
                </button>
                <button id="darkModeToggle" aria-label="Basculer en mode sombre" title="Basculer en mode sombre">
                    <i class="material-icons">brightness_6</i>
                </button>
            </div>
        </header>

        <main class="comparison-area">
            <div class="text-panel" id="panel1">
                <label for="text1" data-lang="text1Label">Texte 1</label>
                <textarea id="text1" aria-label="Entrée de texte 1" placeholder="Coller ou saisir le texte ici..."></textarea>
                <div class="panel-controls">
                    <button class="copy-button" data-text-target="text1" aria-label="Copier le texte 1" title="Copier le texte 1">
                        <i class="material-icons">content_copy</i> <span data-lang="copyButton">Copier</span>
                    </button>
                    <button class="paste-button" data-text-target="text1" aria-label="Coller dans le texte 1" title="Coller dans le texte 1">
                        <i class="material-icons">content_paste</i> <span data-lang="pasteButton">Coller</span>
                    </button>
                    <button class="clear-button" data-text-target="text1" aria-label="Effacer le texte 1" title="Effacer le texte 1">
                        <i class="material-icons">clear</i> <span data-lang="clearButton">Effacer</span>
                    </button>
                </div>
                <div id="diffOutput1" class="diff-output" aria-live="polite" aria-atomic="true" data-lang-placeholder="diffOutputPlaceholder">Les différences apparaîtront ici après la comparaison.</div>
            </div>

            <div class="text-panel" id="panel2">
                <label for="text2" data-lang="text2Label">Texte 2</label>
                <textarea id="text2" aria-label="Entrée de texte 2" placeholder="Coller ou saisir le texte ici..."></textarea>
                <div class="panel-controls">
                    <button class="copy-button" data-text-target="text2" aria-label="Copier le texte 2" title="Copier le texte 2">
                        <i class="material-icons">content_copy</i> <span data-lang="copyButton">Copier</span>
                    </button>
                    <button class="paste-button" data-text-target="text2" aria-label="Coller dans le texte 2" title="Coller dans le texte 2">
                        <i class="material-icons">content_paste</i> <span data-lang="pasteButton">Coller</span>
                    </button>
                    <button class="clear-button" data-text-target="text2" aria-label="Effacer le texte 2" title="Effacer le texte 2">
                        <i class="material-icons">clear</i> <span data-lang="clearButton">Effacer</span>
                    </button>
                </div>
                <div id="diffOutput2" class="diff-output" aria-live="polite" aria-atomic="true" data-lang-placeholder="diffOutputPlaceholder">Les différences apparaîtront ici après la comparaison.</div>
            </div>
        </main>
    </div>
